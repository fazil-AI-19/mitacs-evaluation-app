services:
  - type: web
    name: mitacs-evaluation-app
    runtime: python
    region: oregon
    plan: free
    rootDir: .

    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../backend && CARGO_HOME=/tmp/cargo pip install --prefer-binary -r requirements.txt

    startCommand: cd backend && sh start.sh

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # you will paste this in the Render dashboard
      - key: LLM_MODEL
        value: gpt-4o
      - key: STATIC_DIR
        value: ../frontend/dist
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        value: sqlite:///./mitacs.db
      - key: UPLOAD_DIR
        value: uploads
